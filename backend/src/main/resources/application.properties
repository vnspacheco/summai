spring.application.name=summai-api
server.port=${PORT:8080}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGIN:https://vns-summai.netlify.app}
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.timeout-seconds=${GEMINI_TIMEOUT_SECONDS:30}
app.gemini.max-transcript-characters=${GEMINI_MAX_TRANSCRIPT_CHARACTERS:45000}
app.gemini.system-prompt=Você é um assistente especialista em sumarização. Vou te passar a transcrição de um vídeo. Crie um resumo conciso, destacando os pontos principais, aprendizados e conclusões em formato de tópicos para facilitar a leitura. Mantenha o idioma da resposta em Português.
